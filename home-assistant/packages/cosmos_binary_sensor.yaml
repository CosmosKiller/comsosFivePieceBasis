# Cosmos iotBasicBinarySensor — battery alerts (Matter Power Source)
#
# Loaded as package "cosmos_binary_sensor" via !include_dir_named packages
# (filename = package name — do not add an extra top-level wrapper key).
#
# After commissioning:
#   - Replace sensor.cosmos_contact_battery with your battery entity id (Developer tools → States)
#   - Replace notify.mobile_app_my_phone with your phone service (Developer tools → Services,
#     filter "mobile_app", e.g. notify.mobile_app_pixel_8). See docs/HA.md.

input_boolean:
  cosmos_contact_low_battery_notified:
    name: Cosmos contact — low battery already notified
    icon: mdi:battery-alert

automation:
  - id: cosmos_contact_low_battery
    alias: "Cosmos contact — low battery warning"
    description: Notify when Matter battery % stays below threshold
    triggers:
      - trigger: numeric_state
        entity_id: sensor.cosmos_contact_battery # TODO: replace after commissioning
        below: 20
        for:
          minutes: 10
    conditions:
      - condition: state
        entity_id: input_boolean.cosmos_contact_low_battery_notified
        state: "off"
      - condition: template
        value_template: "{{ trigger.from_state.state not in ['unknown', 'unavailable', 'none'] }}"
    actions:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.cosmos_contact_low_battery_notified
      - action: notify.mobile_app_my_phone
        data:
          title: "Cosmos door sensor — low battery"
          message: >-
            Battery at {{ states('sensor.cosmos_contact_battery') }}%.
            Replace or charge the cell soon.
          data:
            channel: alarm_stream
            importance: high
            ttl: 0
            priority: high

  - id: cosmos_contact_battery_recovered
    alias: "Cosmos contact — battery recovered (reset latch)"
    description: Allow low-battery alert again after charge or recovery
    triggers:
      - trigger: numeric_state
        entity_id: sensor.cosmos_contact_battery # TODO: replace after commissioning
        above: 25
        for:
          minutes: 5
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.cosmos_contact_low_battery_notified
